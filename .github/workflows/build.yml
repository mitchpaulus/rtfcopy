name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build -Dtarget=x86_64-windows -Drelease

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtfcopy-windows
          path: zig-out/bin/rtfcopy.exe
